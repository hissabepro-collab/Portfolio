<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hissa Berton — Data Analyst</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --ink:#0f0f0f;
    --paper:#f5f0e8;
    --cream:#ede8dc;
    --accent:#c8522a;
    --muted:#7a7060;
    --border:rgba(0,0,0,.1);
}

body {font-family:'DM Sans',sans-serif;background:var(--paper);margin:0;}

.projects {padding:4rem;}
.projects-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1px;
    border:1px solid var(--border);
}

.project-card {
    background:white;
    padding:2rem;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    min-height:420px;
}

.project-title {
    font-family:'DM Serif Display',serif;
    font-size:1.2rem;
}

.project-desc {
    color:var(--muted);
    font-size:.9rem;
    flex-grow:1;
}

/* ==== VIDEO ==== */
.video-placeholder {
    position:relative;
    width:100%;
    height:170px;
    border-radius:6px;
    overflow:hidden;
    margin-bottom:1rem;
    cursor:pointer;
}

.video-placeholder img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.play-btn {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:60px;
    height:40px;
    background:red;
    border-radius:8px;
}

/* TAGS */
.project-tags {margin:1rem 0;}
.project-tag {
    font-size:.7rem;
    padding:.3rem .6rem;
    background:var(--cream);
    margin-right:.3rem;
}

/* BUTTONS */
.project-links {margin-top:1rem;}
.project-link {
    padding:.5rem 1rem;
    text-decoration:none;
    font-size:.8rem;
    margin-right:.5rem;
}
.code {background:black;color:white;}
.demo {background:var(--accent);color:white;}

</style>
</head>

<body>

<section class="projects">
<div class="projects-grid" id="projects-grid"></div>
</section>

<script>

const projects = [
{
id:5,
title:"Dashboard Supply Chain",
desc:"Analyse logistique Power BI avec KPI et modélisation.",
tags:["Power BI","KPI","Supply Chain"],
github:"#",
demo:"#"
},
{
id:8,
title:"Workflow N8N",
desc:"Automatisation complète des candidatures avec IA.",
tags:["N8N","Automation","API"],
github:"#",
demo:"#"
},
{
id:1,
title:"Attrition client",
desc:"Modèle prédictif Random Forest.",
tags:["Python","ML"],
github:"#",
demo:"#"
}
];

function renderProjects() {
const grid=document.getElementById("projects-grid");
grid.innerHTML="";

projects.forEach(p=>{

let videoBlock="";

if(p.id===5){
videoBlock=`
<div class="video-placeholder" data-id="claf8YSefT8">
<img src="https://img.youtube.com/vi/claf8YSefT8/maxresdefault.jpg">
<div class="play-btn"></div>
</div>`;
}

if(p.id===8){
videoBlock=`
<div class="video-placeholder" data-id="w97wAkzsCK4">
<img src="https://img.youtube.com/vi/w97wAkzsCK4/maxresdefault.jpg">
<div class="play-btn"></div>
</div>`;
}

grid.innerHTML+=`
<div class="project-card">
<h3 class="project-title">${p.title}</h3>

${videoBlock}

<p class="project-desc">${p.desc}</p>

<div class="project-tags">
${p.tags.map(t=>`<span class="project-tag">${t}</span>`).join("")}
</div>

<div class="project-links">
<a href="${p.github}" class="project-link code">Code</a>
<a href="${p.demo}" class="project-link demo">PDF</a>
</div>

</div>
`;
});
}

// LOAD VIDEO ON CLICK
document.addEventListener("click",e=>{
const el=e.target.closest(".video-placeholder");
if(!el) return;

const id=el.dataset.id;

el.innerHTML=`
<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>
`;
});

renderProjects();

</script>

</body>
</html>
