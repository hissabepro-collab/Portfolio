<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hissa Berton — Data Analyst</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ==== TON CSS EXISTANT (inchangé) ==== */
/* ... (tout ton CSS actuel reste ici) ... */

/* ==== AJOUT VIDEO ==== */
.video-placeholder {
  position: relative;
  width: 100%;
  max-width: 100%;
  aspect-ratio: 16/9;
  cursor: pointer;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 1rem;
}

.video-placeholder img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60px;
  height: 40px;
  background: red;
  border-radius: 8px;
}
</style>
</head>

<body>

<!-- ==== HTML IDENTIQUE ==== -->
<!-- NE RIEN MODIFIER DANS TES SECTIONS -->

<section class="projects" id="projects">
  <div class="projects-grid" id="projects-grid"></div>
</section>

<script>
// ==== DONNÉES IDENTIQUES ====
const projects = [
  /* tes projets inchangés */
];

// ==== RENDER ====
function renderProjects(filter) {
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = '';

  const filtered = filter === 'all'
    ? projects
    : projects.filter(p => p.cat === filter);

  filtered.forEach(p => {

    const codeBtn = p.github
      ? `<a href="${p.github}" class="project-link code" target="_blank"><i class="fab fa-github"></i> Code</a>`
      : '';

    const demoBtn = p.demo
      ? `<a href="${p.demo}" class="project-link demo" target="_blank"><i class="fas fa-file-pdf"></i> Voir PDF</a>`
      : '';

    // ==== VIDEO ====
    let videoBlock = '';

    if (p.id === 5) {
      videoBlock = `
      <div class="video-placeholder" data-id="claf8YSefT8">
        <img src="https://img.youtube.com/vi/claf8YSefT8/maxresdefault.jpg">
        <div class="play-btn"></div>
      </div>`;
    }

    if (p.id === 8) {
      videoBlock = `
      <div class="video-placeholder" data-id="w97wAkzsCK4">
        <img src="https://img.youtube.com/vi/w97wAkzsCK4/maxresdefault.jpg">
        <div class="play-btn"></div>
      </div>`;
    }

    grid.innerHTML += `
      <div class="project-card">
        <p class="project-cat">${p.catLabel}</p>
        <h3 class="project-title">${p.title}</h3>

        ${videoBlock}

        <p class="project-desc">${p.desc}</p>

        <div class="project-tags">
          ${p.tags.map(t => `<span class="project-tag">${t}</span>`).join('')}
        </div>

        <div class="project-links">
          ${codeBtn}${demoBtn}
        </div>
      </div>
    `;
  });
}

// ==== CLICK VIDEO ====
document.addEventListener("click", function(e) {
  const el = e.target.closest(".video-placeholder");
  if (!el) return;

  const id = el.dataset.id;

  el.innerHTML = `
    <iframe 
      src="https://www.youtube.com/embed/${id}?autoplay=1" 
      allowfullscreen>
    </iframe>
  `;
});

// ==== INIT ====
renderProjects('all');
</script>

</body>
</html>
