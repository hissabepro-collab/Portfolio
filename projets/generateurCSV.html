<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur CSV</title>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 2rem;
    background: #f5f5f5;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 2rem;
    border-radius: 8px;
}

h1 {
    margin-bottom: 1rem;
}

.options {
    margin: 1rem 0;
}

button {
    margin-top: 1rem;
    margin-right: 10px;
    padding: 10px 16px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

#generateClassic {
    background: black;
    color: white;
}

#generateAI {
    background: #10b981;
    color: white;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Générateur de données CSV</h1>

<p>
Mode rapide : génération instantanée sans IA.<br>
Mode IA : nécessite une clé API Gemini personnelle.
</p>

<div class="options">
<label><input type="checkbox" id="nulls"> Valeurs nulles</label><br>
<label><input type="checkbox" id="duplicates"> Doublons</label><br>
<label><input type="checkbox" id="english"> Headers anglais</label><br>

<label>Séparateur :</label>
<select id="separator">
<option value=";">;</option>
<option value=",">,</option>
<option value="\t">Tab</option>
</select>
</div>

<input type="text" id="apiKey" placeholder="Clé API Gemini (optionnel)">

<button id="generateClassic">Générer (rapide)</button>
<button id="generateAI">Générer avec IA</button>

</div>

<script>

// ---------- DATA BASE ----------
const names = ["Jean","Paul","Marie","Sophie","Lucas","Emma","Noah","Léa"];
const cities = ["Paris","Lyon","Marseille","Toulouse","Nice"];

// ---------- CLASSIC GENERATION ----------
function generateCSVClassic() {
    const sep = document.getElementById("separator").value;
    const nulls = document.getElementById("nulls").checked;
    const duplicates = document.getElementById("duplicates").checked;
    const english = document.getElementById("english").checked;

    let headers = english
        ? ["name","age","city"]
        : ["nom","age","ville"];

    let rows = [headers.join(sep)];

    for (let i = 0; i < 100; i++) {
        let name = names[Math.floor(Math.random() * names.length)];
        let age = Math.floor(Math.random() * 60) + 18;
        let city = cities[Math.floor(Math.random() * cities.length)];

        if (nulls && Math.random() < 0.1) name = "";
        if (nulls && Math.random() < 0.1) city = "";

        rows.push([name, age, city].join(sep));

        if (duplicates && Math.random() < 0.1) {
            rows.push([name, age, city].join(sep));
        }
    }

    downloadCSV(rows.join("\n"));
}

// ---------- AI GENERATION ----------
async function generateCSVWithAI(apiKey) {
    const sep = document.getElementById("separator").value;

    const prompt = `
Generate a realistic CSV dataset of 50 customers.
Include:
- missing values
- duplicates
Use "${sep}" as separator.
Return ONLY raw CSV.
`;

    try {
        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: prompt }]
                    }]
                })
            }
        );

        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;

        if (!text) {
            alert("Erreur IA");
            return;
        }

        downloadCSV(text);

    } catch (e) {
        alert("Erreur API");
    }
}

// ---------- DOWNLOAD ----------
function downloadCSV(content) {
    const blob = new Blob([content], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "data.csv";
    a.click();

    URL.revokeObjectURL(url);
}

// ---------- EVENTS ----------
document.getElementById("generateClassic").addEventListener("click", generateCSVClassic);

document.getElementById("generateAI").addEventListener("click", () => {
    const key = document.getElementById("apiKey").value;

    if (!key) {
        alert("Ajoute une clé API pour utiliser l’IA");
        return;
    }

    generateCSVWithAI(key);
});

</script>

</body>
</html>
